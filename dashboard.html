<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi - لوحة التحكم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0d0f;
            --emerald: #1a5c4c;
            --emerald-light: #2a7a66;
            --sand: #c9b896;
            --gold: #b8975c;
            --text-white: #f4f1eb;
            --text-soft: #c4bfb4;
            --text-muted: #8a857a;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-white);
            min-height: 100vh;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.1;
            pointer-events: none;
        }
        .glow-1 { top: -200px; right: -200px; background: var(--emerald); }
        .glow-2 { bottom: -200px; left: -200px; background: var(--gold); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--sand) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }
        .logo:hover {
            opacity: 0.8;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .icon-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.6rem 0.8rem;
            color: var(--text-soft);
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .icon-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text-white);
        }

        .logout-btn {
            padding: 0.6rem 1.2rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .logout-btn:hover {
            background: rgba(231, 76, 60, 0.1);
            border-color: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .main-content {
            padding: 3rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .welcome {
            text-align: center;
            margin-bottom: 3rem;
        }
        .welcome-greeting {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .welcome h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .welcome h1 span {
            color: var(--sand);
        }
        .welcome p {
            color: var(--text-muted);
        }

        .assistant-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            margin-bottom: 2rem;
        }
        .assistant-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-light) 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem;
        }
        .assistant-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }
        .assistant-status {
            color: var(--emerald-light);
            font-size: 0.95rem;
        }
        .whatsapp-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 1rem 2rem;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
        }
        .whatsapp-btn:hover {
            background: #1da851;
            transform: translateY(-2px);
        }

        .coming-soon-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2rem;
            text-align: center;
        }
        .coming-soon-card h2 {
            font-size: 1.5rem;
            color: var(--sand);
            margin-bottom: 1rem;
        }
        .coming-soon-card p {
            color: var(--text-muted);
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.8;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 2rem;
        }
        .quick-action {
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem 1rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-soft);
            transition: all 0.3s;
        }
        .quick-action:hover {
            background: rgba(255,255,255,0.06);
            border-color: var(--emerald);
            color: var(--text-white);
        }
        .quick-action-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .quick-action-label {
            font-size: 0.9rem;
        }

        @media (max-width: 480px) {
            .header {
                padding: 1rem;
                flex-direction: column;
                gap: 1rem;
            }
            .welcome h1 { font-size: 1.5rem; }
            .main-content { padding: 2rem 1rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <header class="header">
        <a href="/main_site.html" class="logo" style="text-decoration: none; color: inherit;">LUMI</a>
        <div class="header-actions">
            <button class="icon-btn" onclick="goToSettings()" title="Settings">⚙️</button>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="main-content">
        <div class="welcome">
            <p class="welcome-greeting" id="greeting">Hello</p>
            <h1>Welcome <span id="userNickname">بك</span> 👋</h1>
            <p>How can I help you today?</p>
        </div>

        <div class="assistant-card">
            <div class="assistant-avatar">🤖</div>
            <div class="assistant-name" id="assistantName">لومي</div>
            <div class="assistant-status">● Online and ready</div>
            <a href="https://wa.me/14247880551?text=مرحبا" class="whatsapp-btn" target="_blank">
                💬 Start chatting on WhatsApp
            </a>
        </div>

        <div class="coming-soon-card">
            <h2>🚀 Coming soon...</h2>
            <p>We are preparing amazing services for you. Stay tuned for updates!</p>

            <div class="quick-actions">
                <a href="settings.html" class="quick-action">
                    <div class="quick-action-icon">⚙️</div>
                    <div class="quick-action-label">Settings</div>
                </a>
                <a href="#" class="quick-action" onclick="showComingSoon()">
                    <div class="quick-action-icon">💬</div>
                    <div class="quick-action-label">Conversations</div>
                </a>
                <a href="#" class="quick-action" onclick="showComingSoon()">
                    <div class="quick-action-icon">📊</div>
                    <div class="quick-action-label">Reports</div>
                </a>
                <a href="#" class="quick-action" onclick="showComingSoon()">
                    <div class="quick-action-icon">📱</div>
                    <div class="quick-action-label">App</div>
                </a>
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://api.lumiaio.com/api';
        const token = localStorage.getItem('lumi_token');
        const user = JSON.parse(localStorage.getItem('lumi_user') || '{}');

        if (!token && !user.name) {
            window.location.href = '/login.html';
        }

        // Display user info
        function loadUserInfo() {
            const nickname = user.nickname || user.name || 'بك';
            const assistantName = user.secretary_name_ar || user.secretary_name_en || 'سعود';
            
            document.getElementById('userNickname').textContent = nickname;
            document.getElementById('assistantName').textContent = assistantName;

            // Time-based greeting
            const hour = new Date().getHours();
            let greeting = 'Hello';
            if (hour >= 5 && hour < 12) greeting = 'Good morning';
            else if (hour >= 12 && hour < 17) greeting = 'Good afternoon';
            else if (hour >= 17 && hour < 21) greeting = 'Good evening';
            else greeting = 'Welcome';
            
            document.getElementById('greeting').textContent = greeting;
        }

        loadUserInfo();

        function goToSettings() {
            window.location.href = '/settings.html';
        }

        function showComingSoon() {
            alert('Coming soon...');
        }

        async function logout() {
            try {
                await fetch(API_URL + '/logout', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + token }
                });
            } catch (e) {}

            localStorage.removeItem('lumi_token');
            localStorage.removeItem('lumi_user');
            window.location.href = '/login.html';
        }
    </script>
</body>
</html>

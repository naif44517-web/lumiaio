<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi - إنشاء حساب</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0d0f;
            --emerald: #1a5c4c;
            --emerald-light: #2a7a66;
            --sand: #c9b896;
            --gold: #b8975c;
            --text-white: #f4f1eb;
            --text-soft: #c4bfb4;
            --text-muted: #8a857a;
            --error: #e74c3c;
            --success: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-deep);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
        }
        .glow-1 { top: -200px; right: -200px; background: var(--emerald); }
        .glow-2 { bottom: -200px; left: -200px; background: var(--gold); }

        .auth-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
            overflow: hidden;
            box-sizing: border-box;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--sand) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        /* Progress Steps */
        .progress-bar {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .progress-step {
            width: 60px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            transition: background 0.3s;
        }
        .progress-step.active {
            background: var(--emerald);
        }
        .progress-step.done {
            background: var(--gold);
        }

        .step-title {
            text-align: center;
            font-size: 1.1rem;
            color: var(--text-soft);
            margin-bottom: 1.5rem;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 1.25rem;
            width: 100%;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-soft);
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem 1.25rem;
            font-size: 16px;
            font-family: 'Tajawal', sans-serif;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-white);
            transition: all 0.3s ease;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--emerald);
            background: rgba(26, 92, 76, 0.1);
        }
        .form-group input::placeholder { color: var(--text-muted); }

        /* Phone Row - Fixed Layout */
        .phone-row {
            display: flex !important;
            flex-direction: row-reverse !important;
            gap: 10px !important;
            width: 100% !important;
        }
        .phone-code {
            width: 85px !important;
            min-width: 85px !important;
            max-width: 85px !important;
            padding: 1rem 0.5rem !important;
            font-size: 16px !important;
            font-family: 'Tajawal', sans-serif !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            color: var(--text-white) !important;
            text-align: center !important;
            direction: ltr !important;
        }
        .phone-number {
            flex: 1 1 auto !important;
            min-width: 0 !important;
            padding: 1rem 1.25rem !important;
            font-size: 16px !important;
            font-family: 'Tajawal', sans-serif !important;
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 12px !important;
            color: var(--text-white) !important;
            text-align: left !important;
            direction: ltr !important;
        }

        

        .btn {
            width: 100%;
            padding: 1.1rem;
            font-size: 1.1rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: 700;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-light) 100%);
            border: none;
            border-radius: 12px;
            color: var(--text-white);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(26, 92, 76, 0.3);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 0.75rem;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.1);
            box-shadow: none;
        }

        .message {
            text-align: center;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }
        .message.error {
            display: block;
            background: rgba(231, 76, 60, 0.15);
            color: var(--error);
            border: 1px solid rgba(231, 76, 60, 0.3);
        }
        .message.success {
            display: block;
            background: rgba(46, 204, 113, 0.15);
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.3);
        }

        .step { display: none; }
        .step.active { display: block; }

        /* OTP Input */
        .otp-container {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            direction: ltr;
            margin: 1.5rem 0;
        }
        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-white);
            transition: all 0.3s;
        }
        .otp-input:focus {
            outline: none;
            border-color: var(--emerald);
            background: rgba(26, 92, 76, 0.1);
        }

        .verify-method {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .method-btn {
            flex: 1;
            padding: 1rem;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: var(--text-soft);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .method-btn.selected {
            border-color: var(--emerald);
            background: rgba(26, 92, 76, 0.15);
            color: var(--text-white);
        }
        .method-btn:hover:not(.selected) {
            border-color: rgba(255,255,255,0.2);
        }

        .resend-link {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .resend-link a {
            color: var(--sand);
            text-decoration: none;
            cursor: pointer;
        }
        .resend-link a:hover { text-decoration: underline; }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.08);
            color: var(--text-muted);
            font-size: 0.95rem;
        }
        .login-link a {
            color: var(--sand);
            text-decoration: none;
            font-weight: 600;
        }

        /* Personalization */
        .emoji-hint {
            font-size: 2rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        @media (max-width: 480px) {
            .auth-container { padding: 2rem 1.5rem; }
            .logo { font-size: 2rem; }
            .otp-input { width: 45px; height: 55px; font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="auth-container">
        <div class="logo">LUMI</div>
        <p class="subtitle">معك وين رحت، تحت أمرك أي وقت</p>

        <div class="progress-bar">
            <div class="progress-step active" id="prog1"></div>
            <div class="progress-step" id="prog2"></div>
            <div class="progress-step" id="prog3"></div>
        </div>

        <div id="message" class="message"></div>

        <!-- Step 1: Basic Info -->
        <div id="step1" class="step active">
            <p class="step-title">البيانات الأساسية</p>
            <form onsubmit="goToStep2(event)">
                <div class="form-group">
                    <label>الاسم الكامل</label>
                    <input type="text" id="reg-name" placeholder="" required>
                </div>
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="reg-email" placeholder="email@example.com" required>
                </div>
                <div class="form-group phone-group">
                    <label>رقم الجوال</label>
                    <div class="phone-row">
                        <select id="country-code" class="phone-code">
                            <option value="+966">+966</option>
                            <option value="+971">+971</option>
                            <option value="+973">+973</option>
                            <option value="+965">+965</option>
                            <option value="+968">+968</option>
                            <option value="+974">+974</option>
                            <option value="+20">+20</option>
                            <option value="+962">+962</option>
                        </select>
                        <input type="tel" id="reg-phone" class="phone-number" placeholder="5xxxxxxxx" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="reg-password" placeholder="8 أحرف على الأقل" minlength="8" required>
                </div>
                <button type="submit" class="btn">متابعة</button>
            </form>
            <div class="login-link">
                عندك حساب؟ <a href="login.html">سجل دخول</a>
            </div>
        </div>

        <!-- Step 2: OTP Verification -->
        <div id="step2" class="step">
            <p class="step-title">التحقق من الحساب</p>
            
            <p style="text-align:center; color: var(--text-muted); margin-bottom: 1rem;">اختر طريقة التحقق:</p>
            
            <div class="verify-method">
                <button class="method-btn selected" onclick="selectMethod('phone')">📱 جوال</button>
                <button class="method-btn" onclick="selectMethod('email')">📧 إيميل</button>
            </div>

            <p style="text-align:center; color: var(--text-soft); font-size: 0.95rem;" id="otp-sent-msg">
                سنرسل رمز التحقق إلى جوالك
            </p>

            <div class="otp-container">
                <input type="text" class="otp-input" maxlength="1" oninput="otpMove(this, 1)">
                <input type="text" class="otp-input" maxlength="1" oninput="otpMove(this, 2)">
                <input type="text" class="otp-input" maxlength="1" oninput="otpMove(this, 3)">
                <input type="text" class="otp-input" maxlength="1" oninput="otpMove(this, 4)">
                <input type="text" class="otp-input" maxlength="1" oninput="otpMove(this, 5)">
                <input type="text" class="otp-input" maxlength="1" oninput="otpMove(this, 6)">
            </div>

            <button class="btn" onclick="verifyOTP()">تحقق</button>
            <button class="btn btn-secondary" onclick="sendOTP()">إرسال الرمز</button>

            <div class="resend-link">
                ما وصلك؟ <a onclick="sendOTP()">إعادة الإرسال</a>
            </div>
        </div>

        <!-- Step 3: Personalization -->
        <div id="step3" class="step">
            <div class="emoji-hint">🤖</div>
            <p class="step-title">خلنا نتعرف عليك</p>

            <div class="form-group">
                <label>وش تبي اسم سكرتيرك؟</label>
                <input type="text" id="assistant-name" placeholder="لومي" value="لومي">
            </div>

            <div class="form-group">
                <label>وش تحب يناديك؟</label>
                <input type="text" id="user-nickname" placeholder="أبو سعود، محمد، بوس...">
            </div>

            <div class="form-group">
                <label>اللغة المفضلة</label>
                <select id="user-language">
                    <option value="ar">العربية</option>
                    <option value="en">English</option>
                </select>
            </div>

            <button class="btn" onclick="completeRegistration()">ابدأ مع سكرتيرك 🚀</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.lumiaio.com/api';
        let currentStep = 1;
        let verifyMethod = 'phone';
        let userData = {};

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
        }

        function updateProgress(step) {
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById('prog' + i);
                el.classList.remove('active', 'done');
                if (i < step) el.classList.add('done');
                if (i === step) el.classList.add('active');
            }
        }

        function showStep(step) {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step' + step).classList.add('active');
            updateProgress(step);
            hideMessage();
            currentStep = step;
        }

        // Step 1 → Step 2
        async function goToStep2(e) {
            e.preventDefault();
            
            userData.name = document.getElementById('reg-name').value.trim();
            userData.email = document.getElementById('reg-email').value.trim().toLowerCase();
            const countryCode = document.getElementById('country-code').value;
            const phoneNumber = document.getElementById('reg-phone').value.trim();
            userData.phone = countryCode + phoneNumber;
            userData.password = document.getElementById('reg-password').value;

            if (userData.password.length < 8) {
                showMessage('كلمة المرور يجب أن تكون 8 أحرف على الأقل', 'error');
                return;
            }

            // Check if email/phone already exists
            try {
                const res = await fetch(API_URL + '/check-user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userData.email, phone: userData.phone })
                });
                const data = await res.json();
                if (data.exists) {
                    showMessage('البريد أو رقم الجوال مسجل مسبقاً', 'error');
                    return;
                }
            } catch (err) {
                // Continue anyway if API not available
            }

            showStep(2);
        }

        // Select verification method
        function selectMethod(method) {
            verifyMethod = method;
            document.querySelectorAll('.method-btn').forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');
            
            const msg = document.getElementById('otp-sent-msg');
            if (method === 'phone') {
                msg.textContent = 'سنرسل رمز التحقق إلى جوالك';
            } else {
                msg.textContent = 'سنرسل رمز التحقق إلى بريدك';
            }
        }

        // Send OTP
        async function sendOTP() {
            const target = verifyMethod === 'phone' ? userData.phone : userData.email;
            
            if (!target) {
                showMessage('الرجاء إدخال البيانات أولاً', 'error');
                return;
            }
            
            // Show loading
            showMessage('جاري إرسال الرمز...', 'success');
            
            try {
                const res = await fetch(API_URL + '/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        method: verifyMethod, 
                        target: target 
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    const maskedTarget = verifyMethod === 'phone' 
                        ? '<span dir="ltr">' + target.slice(0, 4) + '****' + target.slice(-2) + '</span>'
                        : target.split('@')[0].slice(0, 2) + '***@' + target.split('@')[1];
                    document.getElementById('message').innerHTML = 'تم إرسال الرمز إلى ' + maskedTarget + ' ✓';
                    document.getElementById('message').className = 'message success';
                } else {
                    showMessage(data.error || 'خطأ في الإرسال', 'error');
                }
            } catch (err) {
                // For demo, show success
                const maskedTarget = verifyMethod === 'phone' 
                    ? '<span dir="ltr">' + target.slice(0, 4) + '****' + target.slice(-2) + '</span>'
                    : target.split('@')[0].slice(0, 2) + '***@' + target.split('@')[1];
                document.getElementById('message').innerHTML = 'تم إرسال الرمز إلى ' + maskedTarget + ' ✓';
                document.getElementById('message').className = 'message success';
            }
        }

        // OTP input movement
        function otpMove(current, index) {
            if (current.value.length === 1 && index < 6) {
                document.querySelectorAll('.otp-input')[index].focus();
            }
        }

        // Verify OTP
        async function verifyOTP() {
            const inputs = document.querySelectorAll('.otp-input');
            let otp = '';
            inputs.forEach(inp => otp += inp.value);

            if (otp.length !== 6) {
                showMessage('أدخل رمز التحقق كاملاً', 'error');
                return;
            }

            try {
                const res = await fetch(API_URL + '/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        method: verifyMethod,
                        target: verifyMethod === 'phone' ? userData.phone : userData.email,
                        otp: otp 
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    showStep(3);
                } else {
                    showMessage(data.error || 'رمز التحقق غير صحيح', 'error');
                }
            } catch (err) {
                // For demo, proceed to step 3
                showStep(3);
            }
        }

        // Complete Registration
        async function completeRegistration() {
            userData.assistantName = document.getElementById('assistant-name').value.trim() || 'لومي';
            userData.nickname = document.getElementById('user-nickname').value.trim();
            userData.language = document.getElementById('user-language').value;

            try {
                const res = await fetch(API_URL + '/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('lumi_token', data.token);
                    localStorage.setItem('lumi_user', JSON.stringify(data.user));
                    showMessage('تم إنشاء حسابك بنجاح! 🎉', 'success');
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    showMessage(data.error || 'خطأ في إنشاء الحساب', 'error');
                }
            } catch (err) {
                // For demo, simulate success
                localStorage.setItem('lumi_user', JSON.stringify({
                    name: userData.name,
                    email: userData.email,
                    assistantName: userData.assistantName,
                    nickname: userData.nickname
                }));
                showMessage('تم إنشاء حسابك بنجاح! 🎉', 'success');
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);
            }
        }

        // Check if already logged in
        if (localStorage.getItem('lumi_token')) {
            window.location.href = '/dashboard.html';
        }
    </script>
</body>
</html>

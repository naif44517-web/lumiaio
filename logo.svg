<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D9FF"/>
    </linearGradient>
    <linearGradient id="sparkGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#E0E7FF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#glow)"/>
  
  <!-- Inner Glow Circle -->
  <circle cx="256" cy="256" r="200" fill="url(#bgGradient)" opacity="0.5"/>
  
  <!-- Main Spark/Star Shape -->
  <g transform="translate(256, 256)">
    <!-- Center Star -->
    <path d="M0 -120 L20 -40 L100 -30 L40 30 L60 110 L0 70 L-60 110 L-40 30 L-100 -30 L-20 -40 Z" 
          fill="url(#sparkGradient)" 
          opacity="0.95"/>
    
    <!-- Smaller Sparkles -->
    <circle cx="-80" cy="-80" r="15" fill="white" opacity="0.8"/>
    <circle cx="90" cy="-60" r="10" fill="white" opacity="0.6"/>
    <circle cx="70" cy="80" r="12" fill="white" opacity="0.7"/>
    <circle cx="-60" cy="90" r="8" fill="white" opacity="0.5"/>
    
    <!-- Tiny Dots -->
    <circle cx="-40" cy="-100" r="5" fill="white" opacity="0.4"/>
    <circle cx="110" cy="20" r="6" fill="white" opacity="0.5"/>
    <circle cx="-100" cy="40" r="4" fill="white" opacity="0.3"/>
  </g>
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="235" stroke="white" stroke-width="3" fill="none" opacity="0.2"/>
</svg>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi - استعادة كلمة المرور</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0d0f;
            --emerald: #1a5c4c;
            --emerald-light: #2a7a66;
            --sand: #c9b896;
            --gold: #b8975c;
            --text-white: #f4f1eb;
            --text-soft: #c4bfb4;
            --text-muted: #8a857a;
            --error: #e74c3c;
            --success: #2ecc71;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-deep);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
        }
        .glow-1 { top: -200px; right: -200px; background: var(--emerald); }
        .glow-2 { bottom: -200px; left: -200px; background: var(--gold); }

        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
            position: relative;
            z-index: 1;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--sand) 0%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            color: var(--text-soft);
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-white);
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--emerald-light);
            background: rgba(255, 255, 255, 0.08);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-light) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            font-family: 'Tajawal', sans-serif;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(26, 92, 76, 0.3);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .message.error {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: var(--error);
            display: block;
        }

        .message.success {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: var(--success);
            display: block;
        }

        .login-link {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .login-link a {
            color: var(--emerald-light);
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        #step2 {
            display: none;
        }
    </style>
</head>
<body>
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="container">
        <div class="logo">LUMI</div>
        <div class="subtitle">استعادة كلمة المرور</div>

        <div id="message" class="message"></div>

        <!-- Step 1: Request OTP -->
        <div id="step1">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="email@example.com" required>
            </div>
            <button onclick="requestOTP()" class="btn" id="requestBtn">إرسال رمز التحقق</button>
        </div>

        <!-- Step 2: Verify OTP + New Password -->
        <div id="step2">
            <div class="form-group">
                <label>رمز التحقق (OTP)</label>
                <input type="text" id="otp" placeholder="أدخل الرمز المرسل لبريدك" maxlength="6" required>
            </div>
            <div class="form-group">
                <label>كلمة المرور الجديدة</label>
                <input type="password" id="new-password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>تأكيد كلمة المرور</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>
            <button onclick="resetPassword()" class="btn" id="resetBtn">تغيير كلمة المرور</button>
        </div>

        <div class="login-link">
            تذكرت كلمة المرور؟ <a href="login.html">سجل دخولك</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.lumiaio.com/api';
        let userEmail = '';

        // Check if email was passed in URL
        const urlParams = new URLSearchParams(window.location.search);
        const emailParam = urlParams.get('email');
        if (emailParam) {
            document.getElementById('email').value = emailParam;
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        async function requestOTP() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            
            if (!email) {
                showMessage('الرجاء إدخال البريد الإلكتروني', 'error');
                return;
            }

            const btn = document.getElementById('requestBtn');
            btn.disabled = true;
            btn.textContent = 'جاري الإرسال...';

            try {
                const res = await fetch(API_URL + '/reset-request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();

                if (res.ok) {
                    userEmail = email;
                    showMessage('تم إرسال رمز التحقق إلى بريدك الإلكتروني', 'success');
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    showMessage(data.error || 'حدث خطأ', 'error');
                    btn.disabled = false;
                    btn.textContent = 'إرسال رمز التحقق';
                }
            } catch (err) {
                showMessage('خطأ في الاتصال بالسيرفر', 'error');
                btn.disabled = false;
                btn.textContent = 'إرسال رمز التحقق';
            }
        }

        async function resetPassword() {
            const otp = document.getElementById('otp').value.trim();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!otp || !newPassword || !confirmPassword) {
                showMessage('الرجاء ملء جميع الحقول', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('كلمة المرور غير متطابقة', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'جاري التغيير...';

            try {
                const res = await fetch(API_URL + '/reset-verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: userEmail, 
                        otp: otp,
                        new_password: newPassword 
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    showMessage('تم تغيير كلمة المرور بنجاح! جاري التحويل...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showMessage(data.error || 'حدث خطأ', 'error');
                    btn.disabled = false;
                    btn.textContent = 'تغيير كلمة المرور';
                }
            } catch (err) {
                showMessage('خطأ في الاتصال بالسيرفر', 'error');
                btn.disabled = false;
                btn.textContent = 'تغيير كلمة المرور';
            }
        }

        // Enter key handling
        document.getElementById('email').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') requestOTP();
        });

        document.getElementById('confirm-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') resetPassword();
        });
    </script>
</body>
</html>
